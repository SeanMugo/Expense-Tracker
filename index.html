<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Expense Tracker · Simple & Smart</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-start justify-center p-4">
    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl p-6 mt-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">🧾 Expense Tracker</h1>
        <p class="text-gray-500 mb-6">Keep track of your daily spending – simple & persistent.</p>

    
        <div class="bg-gray-100 p-5 rounded-xl mb-6">
            <h2 class="text-lg font-semibold mb-3">➕ Add new expense</h2>
            <div class="grid grid-cols-1 sm:grid-cols-4 gap-3">
                <input type="text" id="desc" placeholder="Description (e.g. Coffee)" 
                       class="col-span-1 sm:col-span-2 p-2 border rounded-lg focus:ring focus:ring-blue-200">
                <input type="number" id="amount" placeholder="Amount (€)" min="0.01" step="0.01"
                       class="p-2 border rounded-lg focus:ring focus:ring-blue-200">
                <select id="category" class="p-2 border rounded-lg bg-white">
                    <option value="Food">🍔 Food</option>
                    <option value="Transport">🚌 Transport</option>
                    <option value="Entertainment">🎬 Entertainment</option>
                    <option value="Other">📦 Other</option>
                </select>
                <button id="addBtn" 
                        class="col-span-1 sm:col-span-4 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition">
                    + Add expense
                </button>
            </div>
            <p id="formError" class="text-red-500 text-sm mt-2 hidden"></p>
        </div>

        <div class="flex flex-wrap items-center justify-between gap-4 mb-4">
            <div class="flex items-center gap-2">
                <span class="font-medium">Filter:</span>
                <select id="filterCategory" class="p-2 border rounded-lg bg-white text-sm">
                    <option value="All">All categories</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="bg-green-100 px-4 py-2 rounded-full font-semibold text-green-800">
                💶 Today's total: <span id="totalDisplay">0.00</span> €
            </div>
        </div>

     
        <div id="expensesList" class="space-y-2 mt-4">
        
            <p class="text-gray-400 text-center py-4">No expenses yet. Add one above 👆</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
